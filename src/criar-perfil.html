<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-visual" />
        <!-- cor da barra de navegação/status: theme-color cobre Chrome Android,
             Edge Mobile, Samsung Browser, Opera Mobile e Firefox Android (89+),
             além do Safari iOS 15+. As duas tags apple-mobile-web-app-* seguem
             cobrindo a status bar do Safari quando adicionado à tela de início
             (modo standalone), incluindo versões de iOS anteriores à 15. -->
        <meta name="theme-color" content="#0a0e17" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <title>Criar perfil</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="app" id="app">
            <header>
                <button class="btn" id="exit" aria-label="Sair do formulário">
                    <svg viewBox="0 0 24 24"><path d="M5 5l14 14M19 5L5 19" /></svg>
                </button>
                <div class="step-title" id="title">CRIAR <span>CONTA</span></div>
                <div class="step-state icon-cell" aria-live="polite" aria-label="Etapa atual de total">
                    <span id="stepNow">1</span><span class="step-total">/3</span>
                </div>
            </header>

            <div class="track-clip" id="clip">
                <div class="track" id="track">
                    <div class="panel" data-step="0">
                        <textarea id="user" class="oneline" placeholder="Qual é o seu nome?" autocomplete="off" spellcheck="false" enterkeyhint="next" rows="1"></textarea>
                        <div class="fake-caret" aria-hidden="true"><svg><path class="drop" /></svg></div>
                    </div>
                    <div class="panel" data-step="1">
                        <textarea id="role" class="oneline" placeholder="Qual é a sua profissão?" autocomplete="off" enterkeyhint="next" rows="1"></textarea>
                        <div class="fake-caret" aria-hidden="true"><svg><path class="drop" /></svg></div>
                    </div>
                    <div class="panel" data-step="2" id="bioPanel">
                        <div class="mirror" id="mirror" aria-hidden="true"></div>
                        <textarea id="bio" placeholder="Conte um pouco sobre você (opcional)." maxlength="1200"></textarea>
                        <div class="fake-caret" aria-hidden="true"><svg><path class="drop" /></svg></div>
                    </div>
                </div>

                <div class="landing" id="landing">
                    <p class="landing-title">Vamos <span>criar seu perfil</span></p>
                </div>
            </div>

            <footer>
                <div class="error-msg" id="nameErr" role="alert">Nome em uso</div>

                <button type="button" class="landing-cta" id="startBtn">Criar perfil</button>

                <div class="bar">
                    <button class="btn" id="back" aria-label="Voltar etapa">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 12H6" />
                            <path d="M11 6l-6 6 6 6" />
                        </svg>
                    </button>
                    <button class="btn" id="hideKb" aria-label="Fechar teclado">
                        <svg viewBox="0 0 24 24">
                            <rect x="3" y="4" width="18" height="10" rx="2" />
                            <path d="M6.5 7.5h.01M9.5 7.5h.01M12.5 7.5h.01M15.5 7.5h.01M17.5 7.5h.01M6.5 10.5h9" />
                            <path d="M9 19l3 2 3-2" />
                        </svg>
                    </button>

                    <div class="end-group">
                        <div class="over-count" id="over" role="status" aria-label="Caracteres excedidos"></div>
                        <div class="under-count" id="under" role="status" aria-label="Caracteres mínimos restantes"></div>

                        <button class="btn" id="erase" aria-label="Apagar texto excedido">
                            <svg viewBox="0 0 24 24">
                                <path d="M16 3l5 5-9 9H7l-4-4z" />
                                <path d="M9 21h12" />
                            </svg>
                        </button>
                        <button class="btn" id="next" aria-label="Prosseguir">
                            <span class="next-icon-cell">
                                <svg viewBox="0 0 24 24" id="nextIcon">
                                    <path d="M4 12h14" />
                                    <path d="M13 6l6 6-6 6" />
                                </svg>
                            </span>
                        </button>
                    </div>
                </div>
            </footer>
        </div>

        <script src="script.js"></script>
    </body>
</html>
